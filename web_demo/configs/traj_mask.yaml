traj_mask:
  # V1 streaming control follows the training-time default of dense trajectory conditioning.
  # Keep random masking disabled in the web demo unless you are explicitly debugging sparsity.
  enabled: false
  keep_ratio_min: 0.20
  keep_ratio_max: 0.30

  # Keep the first and last time steps unmasked to preserve start/end constraints.
  # If you want fully random masking without constraints, set to false.
  keep_first_last: true

  # Streaming horizon (in latent tokens) used for replace_future replanning.
  horizon_tokens: 20

  # Default and clamped token-step distances for arc-length resampling.
  # The demo will estimate speed from recent motion first, then fall back to this default.
  default_token_step: 0.25
  min_token_step: 0.05
  max_token_step: 1.50
