exp_name: ldf_tiny # Experiment names
seed: 1234 # Seed value
debug: true
train: false

dirs:
    deps: /data1/yuankai/text2motion/FloodDiffusion/deps
    outputs: ./outputs
    raw_data: /data1/yuankai/text2motion/FloodDiffusion/raw_data

save_dir: ./outputs
resume_ckpt: "${dirs.outputs}/20251219_01492_ldf_tiny_stream/step_step=200000.ckpt"
test_ckpt: "${dirs.outputs}/20251219_01492_ldf_tiny_stream/step_step=200000.ckpt"
test_vae_ckpt: "${dirs.outputs}/vae_1d_z4_step=300000.ckpt"
test_vae:
    target: models.vae_wan_1d.VAEWanModel
    ema_decay: 0.99
    params:
        input_dim: 263
        z_dim: 4
test_setting:
    render: true
    simple: true
    recover_dim: 263
    HumanML3D:
        compare_folders:
            - "${dirs.raw_data}/HumanML3D/animations"
        compare_names:
            - "Ground Truth"
val_repeat: 1

logger:
    wandb:
        wandb_key: "${wandb_info.key}"
        project: "${wandb_info.project}"
        entity: "${wandb_info.entity}"

trainer: # lightning trainer
    max_steps: 300000
    accelerator: gpu
    devices: [2,3]
    log_every_n_steps: 100
    precision: bf16-mixed
validation:
    validation_steps: 5000
    test_steps: 5000
    save_every_n_steps: 5000
    save_top_k: 100
metrics:
    dim: 263
    t2m:
        evaluate_text: true
        fid_target: "original" # vae or original
        metric_mean_path: "${dirs.deps}/t2m/meta/mean.npy"
        metric_std_path: "${dirs.deps}/t2m/meta/std.npy"
        wordvectorizer:
            target: metrics.tools.word_vectorizer.WordVectorizer
            params:
                meta_root: "${dirs.deps}/glove"
                prefix: our_vab
            max_text_len: 20
        textencoder:
            target: metrics.tools.t2m_evaluator.TextEncoderBiGRUCo
            ckpt: "${dirs.deps}/t2m/humanml3d/text_encoder.pt"
            params:
                word_size: 300
                pos_size: 15
                hidden_size: 512
                output_size: 512
        moveencoder:
            target: metrics.tools.t2m_evaluator.MovementConvEncoder
            ckpt: "${dirs.deps}/t2m/humanml3d/movement_encoder.pt"
            params:
                input_size: 259
                hidden_size: 512
                output_size: 512
        motionencoder:
            target: metrics.tools.t2m_evaluator.MotionEncoderBiGRUCo
            ckpt: "${dirs.deps}/t2m/humanml3d/motion_encoder.pt"
            params:
                input_size: 512
                hidden_size: 1024
                output_size: 512

data:
    target: datasets.humanml3d.HumanML3DDataset
    collate_fn: datasets.humanml3d.collate_fn
    train_bs: 4   # reduced for single-GPU OOM; effective bs = 8 * accumulate_grad_batches
    val_bs: 16
    test_bs: 1
    num_workers: 8
    train_meta_paths:
        - ${dirs.raw_data}/HumanML3D/train.txt
    val_meta_paths:
        - ${dirs.raw_data}/HumanML3D/val.txt
        # - ${dirs.raw_data}/HumanML3D/test_min.txt
        # - ${dirs.raw_data}/HumanML3D/test.txt
        # - ${dirs.raw_data}/HumanML3D/val_debug.txt
    test_meta_paths:
        - ${dirs.raw_data}/HumanML3D/test_min.txt
    feature_path: "new_joint_vecs"
    token_path: "TOKENS_20251030_085836_vae_wan_z4"
    text_path: "texts"
    mask_ratio: 1.0
    random_length: 0
    min_length: 40
    max_length: 200

model:
    target: models.diffusion_forcing_wan_tiny.DiffForcingWanModel
    ema_decay: 0.99
    params:
        model_name: "google/umt5-base"
        input_dim: 4
        noise_steps: 10
        hidden_dim: 256
        ffn_dim: 1024
        freq_dim: 64
        num_heads: 8
        num_layers: 8
        time_embedding_scale: 1.0
        chunk_size: 5
        use_text_cond: True
        text_len: 512
        dropout: 0.1
        cfg_scale_text: 5.0
        prediction_type: "vel"
        causal: False

        # Optional: skip online HF T5 (same format as pretokenize_t5_text_tiny.py output)
        # use_precomputed_text_emb: true
        # precomputed_text_emb_path: "${dirs.raw_data}/HumanML3D/umt5_tiny_text_embeddings.pt"

        freeze_backbone: true
        traj_encoder_in_dim: 4
        traj_out_dim: 64
        traj_dropout: 0.1
        use_traj_emb_cache: true
        control_loss_weight: 1.0


optimizer:
    target: AdamW
    params:
        lr: 1e-3
        betas: [0.9, 0.999]
        weight_decay: 0.01
        eps: 1e-8

resume_reset_optimizer: false
lr_scheduler:
    target: diffusers.optimization.get_cosine_schedule_with_warmup
    params:
        num_warmup_steps: 2000
        num_training_steps: ${trainer.max_steps}