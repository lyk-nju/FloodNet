# Shared deterministic RootRefiner overfit diagnostic config.
#
# Run one process per GPU, e.g.
#   CUDA_VISIBLE_DEVICES=0 python train_refiner.py --config configs/root_refiner_overfit/a_full_clean.yaml
#
# This inherits the real training config, then disables stochastic regularizers
# that make convergence diagnosis harder. The dataset itself is replaced by a
# fixed pre-sampled cache when fixed_overfit.enabled=true.

base_config: ../root_refiner_train.yaml

debug: false
save_dir: ./outputs/root_refiner_overfit/base
resume_ckpt:

trainer:
  devices: 1
  precision: 32-true
  log_every_n_steps: 20

validation:
  validation_steps: 250
  save_every_n_steps: 1000
  save_top_k: -1

model:
  dropout: 0.0
  decoder_dropout: 0.0

training:
  batch_size: 16
  val_batch_size: 16
  lr: 1.0e-4
  total_steps: 10000
  gradient_clip_val: 1.0

loss_weights:
  smoothness: 0.0

fixed_overfit:
  enabled: true
  num_samples: 64
  val_on_train: true
  force_text_idx: 0
  force_no_path_aug: true
  mode_policy: mixed
