exp_name: ldf # Experiment names
seed: 1234 # Seed value
debug: false
train: true

dirs:
    deps: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/deps
    outputs: ./outputs
    raw_data: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/raw_data

save_dir: ./outputs
resume_ckpt: /data/home/shengqiuProf_user_yuankai/FloodNet/outputs/20260526_194540_ldf/step_317500.ckpt
test_ckpt: /data/home/shengqiuProf_user_yuankai/FloodNet/outputs/20260526_194540_ldf/step_317500.ckpt

test_vae_ckpt: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/vae_1d_z4_step=300000.ckpt
test_vae:
    target: models.vae_wan_1d.VAEWanModel
    ema_decay: 0.99
    params:
        input_dim: 263
        z_dim: 4
test_setting:
    render: true
    simple: true
    recover_dim: 263
    HumanML3D:
        compare_folders:
            - "${dirs.raw_data}/HumanML3D/animations"
        compare_names:
            - "Ground Truth"
val_repeat: 1

logger:
    wandb:
        wandb_key: "${wandb_info.key}"
        project: "${wandb_info.project}"
        entity: "${wandb_info.entity}"

trainer: # lightning trainer
    max_steps: 400000
    accelerator: gpu
    devices: [0,1,2,3,4,5,6,7]
    log_every_n_steps: 100
    precision: bf16-mixed
# Set to true to run T2M FID/R-Precision on val_meta_paths during eval.
t2m_metric: true

validation:
    validation_steps: 5000
    test_steps: 5000
    save_every_n_steps: 2500
    save_top_k: 100
    eval_generation_metrics: true
    eval_num_runs: 5
    eval_seg_size: 20
    eval_forward_control_loss: false
    eval_forward_control_loss_window_mode: mean_chunk_windows
    eval_all_captions: true
metrics:
    dim: 263
    t2m:
        evaluate_text: true
        fid_target: "original" # vae or original
        metric_mean_path: "${dirs.deps}/t2m/meta/mean.npy"
        metric_std_path: "${dirs.deps}/t2m/meta/std.npy"
        wordvectorizer:
            target: metrics.tools.word_vectorizer.WordVectorizer
            params:
                meta_root: "${dirs.deps}/glove"
                prefix: our_vab
            max_text_len: 20
        textencoder:
            target: metrics.tools.t2m_evaluator.TextEncoderBiGRUCo
            ckpt: "${dirs.deps}/t2m/humanml3d/text_encoder.pt"
            params:
                word_size: 300
                pos_size: 15
                hidden_size: 512
                output_size: 512
        moveencoder:
            target: metrics.tools.t2m_evaluator.MovementConvEncoder
            ckpt: "${dirs.deps}/t2m/humanml3d/movement_encoder.pt"
            params:
                input_size: 259
                hidden_size: 512
                output_size: 512
        motionencoder:
            target: metrics.tools.t2m_evaluator.MotionEncoderBiGRUCo
            ckpt: "${dirs.deps}/t2m/humanml3d/motion_encoder.pt"
            params:
                input_size: 512
                hidden_size: 1024
                output_size: 512

data:
    target: datasets.humanml3d.HumanML3DDataset
    collate_fn: datasets.humanml3d.collate_fn
    train_bs: 8
    val_bs: 32
    test_bs: 4
    num_workers: 4
    mask_ratio: 1.0
    traj_feat_dim: 7

    train_meta_paths:
        # - ${dirs.raw_data}/HumanML3D/train.txt
        - ${dirs.raw_data}/HumanML3D/train_difficult.txt
        # - ${dirs.raw_data}/HumanML3D/test_min.txt
        # - ${dirs.raw_data}/HumanML3D/val.txt
    val_meta_paths:
        - ${dirs.raw_data}/HumanML3D/val.txt
        # - ${dirs.raw_data}/HumanML3D/test_min.txt
        # - ${dirs.raw_data}/HumanML3D/test.txt
    test_probe_meta_paths:
        test:
            - ${dirs.raw_data}/HumanML3D/test_min.txt
        train:
            - ${dirs.raw_data}/HumanML3D/train_min.txt

    feature_path: "new_joint_vecs"
    token_path: "TOKENS_20251030_085836_vae_wan_z4"
    text_path: "texts"
    random_length: 0
    min_length: 40
    max_length: 200
    smooth_traj_sigma: 0.0

model:
    target: models.diffusion_forcing_wan.DiffForcingWanModel
    ema_decay: 0.99
    params:
        use_precomputed_text_emb: true
        precomputed_text_emb_path: "${dirs.raw_data}/HumanML3D/t5_text_embeddings.pt"
        checkpoint_path: "${dirs.deps}/t5_umt5-xxl-enc-bf16/models_t5_umt5-xxl-enc-bf16.pth"
        tokenizer_path: "${dirs.deps}/t5_umt5-xxl-enc-bf16/google/umt5-xxl"
        input_dim: 4
        noise_steps: 10
        freeze_backbone: true

        traj_encoder_in_dim: 7
        traj_out_dim: 128
        traj_dropout: 0.1
        text_dropout: 0.2
        use_traj_emb_cache: true

        # Explicit motion-space control loss
        control_loss_weight: 5.0
        scheduled_sampling_prob: 0.0
        cfg_scale_traj: 2.0
        cfg_scale_text: 2.0
        self_forcing_enabled: true
        self_forcing_stride_tokens: 1
        self_forcing_detach_between_steps: true
        # Thresholds are phase progress over [resume_ckpt.global_step, trainer.max_steps].
        self_forcing_k_schedule:
            - [0.0, 5]

# control_loss_train_mode selects gradient strategy for the XZ control loss:
#   1 — active window, absolute coords, no detach   (gradient → ALL tokens via cumsum)
#   2 — active window, absolute coords, detach past (gradient → active window only, wrong abs offset)
#   3 — full sequence, absolute coords, no detach   (balanced gradient)
#   4 — full sequence, absolute coords, detach past (full coverage loss, gradient → active window only)
#   5 — active window, relative displacement, pred anchor  (loss = |e[t]-e[0]|², fixed offset → zero loss)
#   6 — active window, relative displacement, GT anchor    (loss = |pred_rel[t]-gt_rel[t]|², true disp error)
control_loss_train_mode: 1


body_aux_loss:
    enabled: true
    heading_form: cosine        # cosine | smooth_l1
    weights:
        root_xz: 2.0
        root_y: 0.1
        heading: 0.5            # do not disable — wastes the new 7D heading channel
        fwd_delta: 0.1         # delta channels are noisy; conservative in v1
        yaw_delta: 0.1


anchor_canonicalize:
    enabled: true
    source: gt_root      # anchor pose source (v1: read from traj_cond_7d itself)
    mode: full           # full local-frame canonical (translate + rotate)


horizon_sim:
    enabled: true
    unit: token
    inference_horizon_tokens: 20       # inference horizon (token-level); frame count
    early_min_horizon_tokens: 20       # early lower bound (>= inference)
    early_max_horizon_ratio: 1.0       # early upper = clip_tokens * ratio
    late_min_horizon_tokens: 10        # late short-horizon lower bound
    late_max_horizon_tokens: 20        # late upper bound
    p_exact_inference_horizon: 0.5     # late: 50% exact = 20, else U[10,20]
    warmup_ratio: 0.5                  # first 50% of steps = early phase


history_corruption:
    enabled: true
    apply_prob: null            # null = use curriculum below; a float skips curriculum
    alpha_mask: 0.3             # fraction of focus tokens replaced by mask_emb
    alpha_noisy: 0.3            # fraction of focus tokens with additive N(0,(sigma·z_std)^2)
    noise_sigma_factor: 0.05    # noise sigma = noise_sigma_factor * z_std

    z_stats_dir: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/deps/body_stats
    curriculum:
        enabled: true
        early_prob: 0.2         # progress < 1/3
        mid_prob: 0.5           # 1/3 <= progress < 2/3
        late_prob: 0.8          # progress >= 2/3

resume_reset_optimizer: true
optimizer:
    target: AdamW
    params:
        lr: 1e-4
        betas: [0.9, 0.999]
        weight_decay: 0.0
        eps: 1e-8


lr_scheduler:
    target: diffusers.optimization.get_cosine_schedule_with_warmup
    params:
        num_warmup_steps: 1000
        num_training_steps: ${trainer.max_steps}
