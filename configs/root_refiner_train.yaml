exp_name: root_refiner_pace_stream_base
seed: 1234
debug: false
train: true
deterministic: false
save_dir: ./outputs
resume_ckpt:

logger:
  wandb:
    wandb_key: "${wandb_info.key}"
    project: "${refiner_wandb_info.project}"
    entity: "${wandb_info.entity}"
    train_exclude_log_keys:
      - num_token_soft_cls
      - num_token_cls_argmax_mae
      - num_token_cls_soft_mae

trainer:
  max_steps: 200000
  accelerator: auto
  devices: [2, 3]
  log_every_n_steps: 50
  precision: bf16-mixed
  gradient_clip_val: 1.0

validation:
  validation_steps: 1000
  save_every_n_steps: 1000
  save_top_k: -1
  save_last: true
  eval_modes: [groundtruth_duration, pred_duration]
  log_keys:
    - loss
    - pace
    - num_token_pace
    - num_token_pace_mae
    - num_token_pace_acc_pm1
    - num_token_pace_acc_pm2
    - xyz_ADE_m
    - xyz_FDE_m
    - heading
    - fwd_delta
    - yaw_delta

  suites:
    - name: full_dense_max
      mode_policy: full
      full_plan_ratio: 1.0
      horizon_policy: max
      path_condition_policy: dense_path
      offset_start_enabled: false
      offset_start_prob: 0.0

    - name: sliding_dense_random
      mode_policy: sliding
      full_plan_ratio: 0.0
      horizon_policy: random
      path_condition_policy: dense_path
      offset_start_enabled: false
      offset_start_prob: 0.0

    - name: sliding_dense_max
      mode_policy: sliding
      full_plan_ratio: 0.0
      horizon_policy: max
      path_condition_policy: dense_path
      offset_start_enabled: false
      offset_start_prob: 0.0

model:
  target: models.root_refiner.RootRefiner
  ema_decay:
  params:
    d_model: 512
    n_layers: 6
    n_layers_cond: 3
    n_layers_token: 3
    n_heads: 8
    ff_dim: 1024
    dropout: 0.1

    max_tokens: 49
    min_tokens: 4
    frames_per_token: 4

    n_path: 64
    n_hist: 20
    text_emb_dim: 4096
    path_features_dim: 5

    decoder_type: path_cond
    decoder_width: 512
    decoder_path_cond_dim: 6
    decoder_token_res_depth: 2
    decoder_frame_res_depth: 4
    decoder_dilation_growth_rate: 2
    decoder_dropout: 0.1

    pace_text_dim: 32

canonicalization:
  mode: b_full
  anchor: first_effective_frame
  full_plan_valid_history_frames: 1

optimizer:
  target: AdamW
  params:
    lr: 1.0e-4
    weight_decay: 0.01

lr_scheduler:
  target: diffusers.optimization.get_cosine_schedule_with_warmup
  interval: step
  frequency: 1
  params:
    num_warmup_steps: 5000
    num_training_steps: ${trainer.max_steps}

loss:
  heading_form: cosine
  ordinal_sigma: 1.0

loss_weights:
  pace: 1.0
  num_token_pace: 0.1

  # classification head 只作为辅助对照，不再作为主 duration planner
  num_token_cls: 0.0
  num_token_soft_cls: 0.0

  # 第一轮只验证 xyz/head + pace，不混入 dynamics loss
  xyz: 5.0
  heading: 1.0
  fwd_delta: 0.0
  yaw_delta: 0.0
  path_control: 0.0
  smoothness: 0.0

text_encoder:
  type: precomputed_t5_pool
  precomputed_text_emb_path: ${data.raw_data_dir}/HumanML3D/t5_text_embeddings.pt
  pooling: mean
  share_with: ldf
  freeze: true
  debug_stub: false

data:
  target: datasets.humanml3d_refiner.HumanML3DRefinerDataset
  collate_fn: datasets.humanml3d_refiner.refiner_collate
  train_bs: 128
  val_bs: 128
  test_bs: 128
  num_workers: 4

  raw_data_dir: /data1/yuankai/text2Motion/FloodDiffusion/raw_data
  dataset: humanml3d
  train_split_file: train.txt
  val_split_file: val.txt
  feature_path: new_joint_vecs
  text_path: texts

  normalize: true
  stats_dir: deps/refiner_stats

  path_feature_stats_dir: null

sampling:
  full_plan_ratio: 0.3
  horizon_policy: random

  path_condition:
    policy: mixed
    ratios:
      dense_path: 1.0
      sparse_path: 0.0
      goal_point: 0.0

    offset_start:
      enabled: false
      prob: 0.0
      max_frames: 0
      apply_to: []

    sparse_path:
      point_range: [3, 8]
