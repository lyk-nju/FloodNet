# RootRefiner debug/smoke config.
#
# This config is intentionally cheap: debug_stub=true and normalize=false.
# Use configs/root_refiner_train.yaml for semantic T5 embeddings and z-score
# normalization.
#
# Hard constraints (do NOT silently drift):
#   - canonicalization.mode = b_full + anchor = first_effective_frame
#   - canonicalization.full_plan_valid_history_frames = 1
#   - loss_weights uses `fwd_delta` / `yaw_delta` (per-frame deltas, NOT m/s).

exp_name: root_refiner_debug
seed: 1234                    # torch + dataset-aug RNG seed (pl.seed_everything)
debug: true                   # true → wandb OFF (smoke); set false for real wandb
train: true
deterministic: false          # true = bit-reproducible (slower)
save_dir: ./outputs
resume_ckpt:                  # path to resume from; empty = fresh run

logger:
  wandb:
    wandb_key: "${wandb_info.key}"
    project: "${refiner_wandb_info.project}"
    entity: "${wandb_info.entity}"

trainer:                      # Lightning Trainer kwargs (mirrors ldf.yaml.trainer)
  max_steps: 100000
  accelerator: auto
  devices: 1
  log_every_n_steps: 10
  precision: 32-true          # smoke runs on CPU; keep fp32
  gradient_clip_val: 1.0

validation:                   # val + checkpoint cadence (mirrors ldf.yaml.validation)
  validation_steps: 1000
  save_every_n_steps: 1000
  save_top_k: -1
  eval_modes: [groundtruth_duration, pred_duration]

model:
  target: models.root_refiner.RootRefiner
  ema_decay:
  params:
    d_model: 256
    n_layers: 6
    n_layers_cond: 3
    n_layers_token: 3
    n_heads: 8
    ff_dim: 1024
    dropout: 0.1
    max_tokens: 49              # = 4 * 49 - 3 = 193 effective frames at prefix
    min_tokens: 4               # = num_frames_for_tokens(4) = 13 frames
    frames_per_token: 4         # causal VAE token width
    n_path: 64                  # arclength-resampled user path length
    n_hist: 20                  # history window length
    text_emb_dim: 512
    path_features_dim: 5
    decoder_type: path_cond     # path_cond | simple
    decoder_width: 256          # PathCondFrameDecoder hidden width
    decoder_path_cond_dim: 6    # [path_x, path_z, tan_x, tan_z, horizon_prog, grid_prog]
    decoder_token_res_depth: 2
    decoder_frame_res_depth: 4
    decoder_dilation_growth_rate: 2
    decoder_dropout: 0.0

canonicalization:
  mode: b_full
  anchor: first_effective_frame
  full_plan_valid_history_frames: 1

optimizer:
  target: AdamW
  params:
    lr: 1.0e-4
    weight_decay: 0.01

lr_scheduler:
  target:
  params: {}

loss:
  heading_form: cosine                # cosine | smooth_l1
  ordinal_sigma: 1.0                  # duration soft-label bandwidth

loss_weights:
  pace: 0.5
  num_token: 0.2
  num_token_soft: 0.02
  xyz: 5.0
  heading: 1.0
  fwd_delta: 0.5                      # per-frame forward delta (NOT m/s)
  yaw_delta: 0.5                      # per-frame yaw delta (NOT rad/s)
  path_control: 0.0                   # enable after basic waypoint fitting is stable
  smoothness: 0.0                     # enable for ablation/fine-tune only

text_encoder:
  share_with: ldf
  freeze: true
  debug_stub: true

data:
  target: datasets.humanml3d_refiner.HumanML3DRefinerDataset
  collate_fn: datasets.humanml3d_refiner.refiner_collate
  train_bs: 64
  val_bs: 64
  test_bs: 64
  num_workers: 4
  raw_data_dir: /data1/yuankai/text2Motion/FloodDiffusion/raw_data
  dataset: humanml3d                    # humanml3d | babel
  train_split_file: train.txt           # babel: train_processed.txt
  val_split_file: val.txt               # babel: val_processed.txt
  feature_path: new_joint_vecs          # babel: motions
  text_path: texts
  # normalize gates z-score. Keep false until compute_5d_stats has populated
  # stats_dir; set true for real training. If true, stats_dir must exist.
  normalize: false
  stats_dir: deps/refiner_stats

sampling:
  full_plan_ratio: 0.5        # full-plan vs sliding split
  horizon_policy: random       # random | max
  path_condition:
    policy: mixed              # mixed | dense_path | sparse_path | goal_point
    ratios:
      dense_path: 0.5
      sparse_path: 0.3
      goal_point: 0.2
    offset_start:
      enabled: true
      prob: 0.3
      max_frames: 40
      apply_to: [dense_path, sparse_path]
    sparse_path:
      point_range: [3, 8]
