# Large-dataset RootRefiner diagnostic:
# - train on the real dataset
# - evaluate on a fixed clean validation cache so val curves are comparable
#
# R2.8: previously this used horizon_policy: max ("take the maximum valid horizon
# per anchor"). That makes N = remaining-frame-count, which is DECOUPLED from the
# path length L — so the duration head could "win" by reading frame budget, not by
# learning N ≈ (L/v̄+3)/4, and the num_token metric became uninformative about the
# overfit we are fixing. We now use horizon_policy: random so N varies with L and
# the head must actually learn the L→N relation. (The exp name is kept for
# continuity with existing runs; it no longer disables random horizons.)
#
# Suggested launch:
#   python train_refiner.py --config configs/root_refiner_train_fixed_val_no_random_token.yaml

base_config: root_refiner_train.yaml

exp_name: root_refiner_fixed_val_no_random_token
save_dir: ./outputs/root_refiner_fixed_val_no_random_token
resume_ckpt:

sampling:
  horizon_policy: random

fixed_overfit:
  enabled: false
