exp_name: stream # Experiment names
seed: 1234 # Seed value

test_ckpt: "/home/yuankai/Text2Motion/FloodNet/outputs/step_460000.ckpt"
test_vae_ckpt: "${dirs.outputs}/vae_1d_z4_step=300000.ckpt"
test_vae:
    target: models.vae_wan_1d.VAEWanModel
    ema_decay: 0.99
    params:
        input_dim: 263
        z_dim: 4
model:
    target: models.diffusion_forcing_wan.DiffForcingWanModel
    ema_decay: 0.99
    params:
        checkpoint_path: "/data1/yuankai/text2Motion/FloodDiffusion/deps/t5_umt5-xxl-enc-bf16/models_t5_umt5-xxl-enc-bf16.pth"
        tokenizer_path: "/data1/yuankai/text2Motion/FloodDiffusion/deps/t5_umt5-xxl-enc-bf16/google/umt5-xxl"
        input_dim: 4
        noise_steps: 10
        cfg_scale_text: 2.0
        cfg_scale_traj: 1.7

# Web-demo trajectory semantics.  Keep this in the main stream config so the
# model checkpoint, CFG scales, debug preset, and interactive trajectory policy
# are always reviewed together.
traj_mask:
    # User-drawn waypoints are treated as a HumanML3D-style 20 FPS root path
    # unless explicit timestamps are provided as [t, x, y, z].
    enabled: false
    time_mode: timestamped
    waypoint_dt: 0.05
    token_dt: 0.20
    horizon_tokens: 20
    repeat_policy: translate_from_current_root

    # Fallback for non-timestamped/polyline mode. Keep this conservative; 0.25
    # was too fast in pred-root closed-loop diagnostics.
    default_token_step: 0.10
    min_token_step: 0.08
    max_token_step: 0.12

# Optional web-demo sanity preset.  When enabled, /api/start ignores the UI text
# and starts from this dataset sample's text plus timestamped GT root trajectory.
# Keep disabled for normal interactive use.
web_demo_debug:
    enabled: true
    dataset: humanml3d
    sample_id: "001168"
    raw_data_dir: /data1/yuankai/text2Motion/FloodDiffusion/raw_data
    feature_path: new_joint_vecs
    text_path: texts
    motion_fps: 20.0
